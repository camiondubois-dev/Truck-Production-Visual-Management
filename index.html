<!doctype html>
<html lang="fr-CA">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Truck Production Visual Management</title>

    <!-- PWA — icône écran d'accueil iPhone -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Titre + couleur + manifest selon la route
         IMPORTANT : le manifest est injecté ICI (inline) pour que Safari
         le lise AVANT tout autre script — sinon il prend le mauvais start_url -->
    <script>
      (function() {
        var p = window.location.pathname;

        var isFinance = p.startsWith('/finance-mobile');
        var isAchats  = p.startsWith('/achats');
        var isTerrain = p.startsWith('/terrain');

        var title = isFinance ? 'Finances CD'
                  : isAchats  ? 'Achats CD'
                  : isTerrain ? 'Terrain CD'
                  : 'Camions Dubois';

        var color = isFinance ? '#f59e0b'
                  : isAchats  ? '#10b981'
                  : '#1e293b';

        // Manifest seulement pour les routes PWA (pas pour l'app principale)
        // Safari lit ce tag immédiatement — on injecte le bon dès le départ
        if (isFinance) {
          document.write('<link rel="manifest" href="/manifest-finance.json">');
        } else if (isAchats) {
          document.write('<link rel="manifest" href="/manifest.json">');
        }

        document.write(
          '<meta name="apple-mobile-web-app-title" content="' + title + '">' +
          '<meta name="theme-color" content="' + color + '">'
        );
      })();
    </script>

    <!-- Service Worker (seulement pour /achats) -->
    <script>
      if ('serviceWorker' in navigator && window.location.pathname.startsWith('/achats')) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
