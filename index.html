<!doctype html>
<html lang="fr-CA">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Truck Production Visual Management</title>

    <!-- PWA — icône + manifest selon la route
         document.write() est synchrone : Safari lit le bon tag immédiatement -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <script>
      (function() {
        var p = window.location.pathname;

        var isFinance    = p.startsWith('/finance-mobile');
        var isAchats     = p.startsWith('/achats');
        var isTerrain    = p.startsWith('/terrain');
        var isProduction = !isFinance && !isAchats && !isTerrain;

        var title = isFinance    ? 'Finances CD'
                  : isAchats    ? 'Achats CD'
                  : isTerrain   ? 'Terrain CD'
                  : 'Production CD';

        var color = isFinance    ? '#f59e0b'
                  : isAchats    ? '#10b981'
                  : isProduction ? '#dc2626'
                  : '#1e293b';

        var icon = isFinance    ? '/icon-finance.png'
                 : isAchats    ? '/icon-achats.png'
                 : isProduction ? '/icon-production.png'
                 : '/apple-touch-icon.png';

        // Icône écran d'accueil
        document.write('<link rel="apple-touch-icon" href="' + icon + '">');

        // Manifest (start_url correct par route)
        if (isFinance) {
          document.write('<link rel="manifest" href="/manifest-finance.json">');
        } else if (isAchats) {
          document.write('<link rel="manifest" href="/manifest.json">');
        } else if (isProduction) {
          document.write('<link rel="manifest" href="/manifest-production.json">');
        }

        document.write(
          '<meta name="apple-mobile-web-app-title" content="' + title + '">' +
          '<meta name="theme-color" content="' + color + '">'
        );
      })();
    </script>

    <!-- Service Worker (seulement pour /achats) -->
    <script>
      if ('serviceWorker' in navigator && window.location.pathname.startsWith('/achats')) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
